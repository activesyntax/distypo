<mat-sidenav-container class="workspace" autosize>

  <!-- SIDENAV -->
  <mat-sidenav mode="side" opened>
    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive #rlaDoc="routerLinkActive"
         [routerLinkActiveOptions]="{ exact: true }"
         [activated]="rlaDoc.isActive">
        <mat-icon matListItemIcon>description</mat-icon>
        <span matListItemTitle>Document</span>
      </a>
      <a mat-list-item routerLink="/settings" routerLinkActive #rlaSet="routerLinkActive"
         [activated]="rlaSet.isActive">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
      <a mat-list-item routerLink="/about" routerLinkActive #rlaAbout="routerLinkActive"
         [activated]="rlaAbout.isActive">
        <mat-icon matListItemIcon>info_outline</mat-icon>
        <span matListItemTitle>About</span>
      </a>
    </mat-nav-list>

    <!-- SUMMARY -->
    <div class="info-panel">
      <app-issues />
      <app-document-info />
    </div>
  </mat-sidenav>

  <!-- CONTENT -->
  <mat-sidenav-content>
    <router-outlet />
  </mat-sidenav-content>

</mat-sidenav-container>
