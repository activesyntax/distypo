<mat-sidenav-container class="workspace" autosize>

  <!-- SIDENAV -->
  <mat-sidenav #sidenav mode="side" opened>
    <mat-nav-list>

      <a mat-list-item (click)="view.set('document')" [activated]="view() === 'document'">
        <mat-icon matListItemIcon>description</mat-icon>
        <span matListItemTitle>Document</span>
      </a>

      <a mat-list-item (click)="view.set('settings')" [activated]="view() === 'settings'">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
      <a mat-list-item (click)="view.set('about')" [activated]="view() === 'about'">
        <mat-icon matListItemIcon>info_outline</mat-icon>
        <span matListItemTitle>About</span>
      </a>
    </mat-nav-list>


    <!-- SUMMARY -->
<!-- // TODO file loaded -->
    @if (true) {
      <div class="info-panel">
        <app-issues></app-issues>

        <app-document-info></app-document-info>
      </div>
    }

  </mat-sidenav>

  <!-- CONTENT -->
  <mat-sidenav-content>
    @switch (view()) {
      @case ('document') { <app-document /> }
      @case ('settings') { <app-settings /> }
      @case ('about') { <app-about/> }
    }
  </mat-sidenav-content>
</mat-sidenav-container>
