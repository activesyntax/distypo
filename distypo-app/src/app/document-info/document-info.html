<mat-card class="summary__card" appearance="outlined">
  <mat-card-header>
    <mat-card-title>Info</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <dl class="summary__stats">

      <dt>Size</dt>
      <dd>{{ formattedSize() }}</dd>
      <dt>Words</dt>
      <dd>{{ documentState.wordCount() }}</dd>
      <dt>Sentences</dt>
      <dd>{{ documentState.sentenceCount() }}</dd>
      <dt>Lines</dt>
      <dd>{{ documentState.lineCount() }}</dd>
    </dl>
  </mat-card-content>
</mat-card>
