<mat-card class="summary__card" appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ filename() }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <dl class="summary__stats">
      <dt>Size</dt>
      <dd>{{ formattedSize() }}</dd>
      <dt>Words</dt>
      <dd>{{ wordCount() }}</dd>
      <dt>Sentences</dt>
      <dd>{{ sentenceCount() }}</dd>
      <dt>Lines</dt>
      <dd>{{ lineCount() }}</dd>
    </dl>
  </mat-card-content>
</mat-card>
