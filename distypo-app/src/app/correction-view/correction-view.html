@if (status().kind !== 'pending') {

<span class="highlight" (click)="onUndo($event)" [attr.data-status]="status().kind">{{ displayText() }}
  <button class="highlight__undo">↶ UNDO</button></span>

} @else {

<!-- Pending: marker in prose + workbench panel -->
<span class="highlight" [attr.data-status]="status().kind">{{ original() }}</span>

<div class="issue">
  <span class="bad" data-hint="keep" (click)="onKeep($event)">{{ original() }}</span>
  →
  @if (isEditing()) {
  <input #editInput class="good good--editing" [value]="replacement()" (keydown.enter)="onCommitEdit($event)"
    (keydown.escape)="onCancelEdit()" (blur)="onCommitEdit($event)" />
  } @else {
  <span class="good" data-hint="fix" (click)="onFix($event)">{{ replacement() }}</span>
  <button class="issue__edit" (click)="onEdit($event)">✎ EDIT</button>
  }
</div>

}
