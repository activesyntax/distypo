@if (hasChanged()){
<span class="highlight pointer"  (click)="onUndo($event)" [attr.data-status]="overallStatus().kind">
  {{ issueContext() }}
  <button class="highlight__undo">↶ UNDO</button>
</span>
} @else {
<span class="highlight" [attr.data-status]="overallStatus().kind">{{ issueContext() }}</span>
}
